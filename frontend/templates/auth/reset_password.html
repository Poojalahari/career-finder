{% extends "base.html" %}
{% block title %}Choose a new password{% endblock %}
{% block content %}
<section class="auth-panel auth-premium">
  <div><p class="eyebrow">Account recovery</p><h1>Choose a new password</h1></div>
  <form class="form-card glass-form" method="post" novalidate>
    {{ form.hidden_tag() }}
    <label>{{ form.password.label }} {{ form.password(autocomplete="new-password") }}</label>
    {% for error in form.password.errors %}<small class="field-error">{{ error }}</small>{% endfor %}
    <label>{{ form.confirm_password.label }} {{ form.confirm_password(autocomplete="new-password") }}</label>
    {{ form.submit(class="button") }}
  </form>
</section>
{% endblock %}
