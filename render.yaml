services:
  - type: web
    name: career-finder
    runtime: docker
    plan: free
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_AUTH_ENABLED
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_EMAIL_REDIRECT_URL
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
